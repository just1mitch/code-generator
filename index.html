<!DOCTYPE html>
<html>

    <head>
        <title>Code Generator</title>
        <link href='http://fonts.googleapis.com/css?family=Lato' rel='stylesheet' type='text/css'>
        <style>
            body {
                font-family: 'Lato', sans-serif;
            }

            .input {
                display: flex;
                justify-content: space-between;
                width: 500px;
                margin-bottom: 1rem;
            }

            .btn {
                border: none;
                color: white;
                padding: 15px 32px;
                text-align: center;
                text-decoration: none;
                background-color: lightslategray;
                border-radius: 4px;
                cursor: pointer;
            }

            .btn:hover {
                box-shadow: 0px 12px 16px 0px rgba(0, 0, 0, 0.24);
            }

            .grid-container {
                display: grid;
                grid-template-columns: repeat(5, 1fr);
                gap: 5px;
                width: 100%;
                max-width: 500px;
                margin-top: 20px;
            }

            .grid-cell {
                aspect-ratio: 1;
                border: 1px solid #ccc;
                border-radius: 4px;
            }

            .cell-red { background-color: #f44336; }
            .cell-blue { background-color: #2196F3; }
            .cell-black { background-color: #212121; }
            .cell-neutral { background-color: #F5F5DC; /* beige */ }
        </style>
        <script>
            const CHARACTER_SET = 'ABCDEFGHIJKLMNPQRSTUVWXYZ123456789'

            function generate_code(code_length) {
                let code = ''
                for (let i = 0; i < code_length; i++) {
                    code += CHARACTER_SET[Math.floor(Math.random() * CHARACTER_SET.length)]
                }
                return code
            }

            function generate_codes(event) {
                event.preventDefault();
                const formdata = new FormData(event.target)
                const data = Object.fromEntries(formdata.entries())
                const num_codes = parseInt(data.num_codes)
                const code_length = parseInt(data.code_length)


                if (isNaN(num_codes) || isNaN(code_length)) {
                    alert("Please enter valid integer inputs")
                    return
                }

                if (CHARACTER_SET.length ** code_length < num_codes) {
                    alert("Cannot generate enough unique codes - please increase code length or decrease number of codes to generate")
                    return
                }

                let codes = []
                while (codes.length < num_codes) {
                    let code = generate_code(code_length)
                    if (codes.includes(code)) continue
                    codes.push(code)
                }

                let element = document.createElement('a');
                let filename = "codes.csv"
                element.setAttribute('href', 'data:text/csv;charset=utf-8,' + encodeURIComponent('ID\n' + codes.join('\n')));
                element.setAttribute('download', filename);
                element.style.display = 'none';
                document.body.appendChild(element);
                element.click();
                document.body.removeChild(element);
            }
        </script>
    </head>

    <body>
        <h1>
            Code Generator
        </h1>
        <h2>
            Generates random, unique alphanumeric codes
        </h2>
        <form onsubmit="generate_codes(event)">
            <div class="input">
                <label for="num_codes">Number of Codes to Generate:</label><br>
                <input type="number" name="num_codes">
            </div>
            <div class="input">
                <label for="code_length">Length of Codes:</label><br>
                <input type="number" name="code_length">
            </div><br>
            <button type="submit" class="btn">Download CSV File</button>
        </form>

        <hr>

        <h2>Codemasters QR Code Scanner</h2>
        <div style="margin-bottom: 1rem;">
            <video id="qr-video" style="width: 100%; max-width: 500px; border: 1px solid #ccc;"></video>
        </div>
        <div>
            <b>Scanned Result:</b> <span id="cam-qr-result">None</span>
        </div>
        <div id="grid-container" class="grid-container" style="display: none;"></div>
        <div>
            <button id="start-scan-btn" class="btn" style="margin-top: 10px; background-color: #4CAF50;">Start Scanning</button>
            <button id="stop-scan-btn" class="btn" style="margin-top: 10px; background-color: #f44336; display: none;">Stop Scanning</button>
        </div>

        <script src="qr-scanner.umd.min.js"></script>
        <script>
            // Set the worker path explicitly since we loaded via script tag instead of ES module
            QrScanner.WORKER_PATH = 'qr-scanner-worker.min.js';

            const video = document.getElementById('qr-video');
            const camQrResult = document.getElementById('cam-qr-result');
            const startScanBtn = document.getElementById('start-scan-btn');
            const stopScanBtn = document.getElementById('stop-scan-btn');

            const qrScanner = new QrScanner(
                video,
                result => {
                    const text = result.data || result;
                    
                    const gridContainer = document.getElementById('grid-container');
                    
                    try {
                        const parsed = JSON.parse(text);
                        if (parsed.indices && parsed.firstTeam) {
                            camQrResult.textContent = 'First Team: ' + parsed.firstTeam;
                            camQrResult.style.color = parsed.firstTeam.toLowerCase() === 'red' ? '#f44336' : (parsed.firstTeam.toLowerCase() === 'blue' ? '#2196F3' : 'green');
                            gridContainer.style.display = 'grid';
                            renderGrid(parsed.indices, parsed.firstTeam);
                        } else {
                            camQrResult.textContent = text;
                            camQrResult.style.color = 'green';
                            gridContainer.style.display = 'none';
                        }
                    } catch (e) {
                         camQrResult.textContent = text;
                         camQrResult.style.color = 'green';
                         gridContainer.style.display = 'none';
                    }
                },
                { returnDetailedScanResult: true, highlightScanRegion: true, highlightCodeOutline: true }
            );

            function renderGrid(indices, firstTeam) {
                const gridContainer = document.getElementById('grid-container');
                gridContainer.innerHTML = '';
                
                const isRedFirst = firstTeam === 'Red';
                const redIndices = isRedFirst ? indices.slice(0, 9) : indices.slice(9, 17);
                const blueIndices = isRedFirst ? indices.slice(9, 17) : indices.slice(0, 9);
                const assassin = indices[17]; // The 18th index is the assassin
                
                for (let i = 0; i < 25; i++) {
                    const cell = document.createElement('div');
                    cell.classList.add('grid-cell');
                    if (redIndices.includes(i)) {
                        cell.classList.add('cell-red');
                    } else if (blueIndices.includes(i)) {
                        cell.classList.add('cell-blue');
                    } else if (i === assassin) {
                        cell.classList.add('cell-black');
                    } else {
                        cell.classList.add('cell-neutral');
                    }
                    gridContainer.appendChild(cell);
                }
            }

            startScanBtn.addEventListener('click', () => {
                qrScanner.start().then(() => {
                    startScanBtn.style.display = 'none';
                    stopScanBtn.style.display = 'inline-block';
                    camQrResult.textContent = 'Scanning...';
                    camQrResult.style.color = 'gray';
                }).catch(err => {
                    camQrResult.textContent = 'Error: ' + err;
                    camQrResult.style.color = 'red';
                });
            });

            stopScanBtn.addEventListener('click', () => {
                qrScanner.stop();
                startScanBtn.style.display = 'inline-block';
                stopScanBtn.style.display = 'none';
            });
        </script>
    </body>

</html>
