<!DOCTYPE html>
<html>

    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Code Generator</title>
        <link href='https://fonts.googleapis.com/css?family=Lato' rel='stylesheet' type='text/css'>
        <style>
            body {
                font-family: 'Lato', sans-serif;
                margin: 0;
                padding: 15px;
                display: flex;
                flex-direction: column;
                align-items: center;
            }

            h1 {
                font-size: 1.5rem;
                text-align: center;
                margin-top: 10px;
                margin-bottom: 20px;
            }

            .controls {
                display: flex;
                flex-direction: column;
                gap: 10px;
                width: 100%;
                max-width: 500px;
                margin-bottom: 15px;
            }

            .btn {
                border: none;
                color: white;
                padding: 15px 20px;
                text-align: center;
                text-decoration: none;
                background-color: lightslategray;
                border-radius: 8px;
                cursor: pointer;
                font-size: 1rem;
                width: 100%;
            }

            .btn:hover {
                box-shadow: 0px 8px 16px 0px rgba(0, 0, 0, 0.2);
            }

            .video-container {
                width: 100%;
                max-width: 500px;
                margin-bottom: 1rem;
            }

            #qr-video {
                width: 100%;
                border: 2px solid #ddd;
                border-radius: 8px;
                background-color: #f9f9f9;
            }

            .result-container {
                width: 100%;
                max-width: 500px;
                text-align: center;
                word-wrap: break-word;
                margin-bottom: 10px;
                font-size: 1.1rem;
            }

            .grid-container {
                display: grid;
                grid-template-columns: repeat(5, 1fr);
                gap: 5px;
                width: 100%;
                max-width: 500px;
                margin-top: 10px;
            }

            .grid-cell {
                aspect-ratio: 1;
                border: 1px solid #ccc;
                border-radius: 4px;
            }

            .cell-red { background-color: #f44336; }
            .cell-blue { background-color: #2196F3; }
            .cell-black { background-color: #212121; }
            .cell-neutral { background-color: #F5F5DC; /* beige */ }
        </style>
        <script src="qr-scanner.umd.min.js"></script>
        <script>
            document.addEventListener('DOMContentLoaded', () => {
                const video = document.getElementById('qr-video');
                const camQrResult = document.getElementById('cam-qr-result');
                const startScanBtn = document.getElementById('start-scan-btn');
                const stopScanBtn = document.getElementById('stop-scan-btn');

                const qrScanner = new QrScanner(
                    video,
                    result => {
                        const text = result.data || result;
                        
                        const gridContainer = document.getElementById('grid-container');
                        
                        try {
                            const parsed = JSON.parse(text);
                            if (parsed.indices && parsed.firstTeam) {
                                camQrResult.textContent = 'First Team: ' + parsed.firstTeam;
                                camQrResult.style.color = parsed.firstTeam.toLowerCase() === 'red' ? '#f44336' : (parsed.firstTeam.toLowerCase() === 'blue' ? '#2196F3' : 'green');
                                gridContainer.style.display = 'grid';
                                renderGrid(parsed.indices, parsed.firstTeam);
                                
                                // Stop scanning on valid game board QR
                                qrScanner.stop();
                                // Reset UI buttons
                                document.getElementById('start-scan-btn').style.display = 'inline-block';
                                document.getElementById('stop-scan-btn').style.display = 'none';
                            } else {
                                camQrResult.textContent = text;
                                camQrResult.style.color = 'green';
                                gridContainer.style.display = 'none';
                            }
                        } catch (e) {
                            camQrResult.textContent = text;
                            camQrResult.style.color = 'green';
                            gridContainer.style.display = 'none';
                        }
                    },
                    { returnDetailedScanResult: true, highlightScanRegion: true, highlightCodeOutline: true }
                );

                function renderGrid(indices, firstTeam) {
                    const gridContainer = document.getElementById('grid-container');
                    gridContainer.innerHTML = '';
                    
                    const isRedFirst = firstTeam === 'Red';
                    const redIndices = isRedFirst ? indices.slice(0, 9) : indices.slice(9, 17);
                    const blueIndices = isRedFirst ? indices.slice(9, 17) : indices.slice(0, 9);
                    const assassin = indices[17]; // The 18th index is the assassin
                    
                    for (let i = 0; i < 25; i++) {
                        const cell = document.createElement('div');
                        cell.classList.add('grid-cell');
                        if (redIndices.includes(i)) {
                            cell.classList.add('cell-red');
                        } else if (blueIndices.includes(i)) {
                            cell.classList.add('cell-blue');
                        } else if (i === assassin) {
                            cell.classList.add('cell-black');
                        } else {
                            cell.classList.add('cell-neutral');
                        }
                        gridContainer.appendChild(cell);
                    }
                }

                startScanBtn.addEventListener('click', () => {
                    qrScanner.start().then(() => {
                        startScanBtn.style.display = 'none';
                        stopScanBtn.style.display = 'inline-block';
                        camQrResult.textContent = 'Scanning...';
                        camQrResult.style.color = 'gray';
                    }).catch(err => {
                        camQrResult.textContent = 'Error: ' + err;
                        camQrResult.style.color = 'red';
                    });
                });

                stopScanBtn.addEventListener('click', () => {
                    
                    startScanBtn.style.display = 'inline-block';
                    stopScanBtn.style.display = 'none';
                });
            });
        </script>
    </head>

    <body>
        <h1>Codemasters QR Scanner</h1>
        
        <div class="controls">
            <button id="start-scan-btn" class="btn" style="background-color: #4CAF50;">Start Scanning</button>
            <button id="stop-scan-btn" class="btn" style="display: none; background-color: #f44336;">Stop Scanning</button>
        </div>

        <div class="video-container">
            <video id="qr-video"></video>
        </div>

        <div class="result-container">
            <b>Scanned Result:</b> <br/>
            <span id="cam-qr-result">None</span>
        </div>

        <div id="grid-container" class="grid-container" style="display: none;"></div>
    </body>

</html>
